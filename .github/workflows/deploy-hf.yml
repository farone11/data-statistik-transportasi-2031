name: Deploy to HF Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - run: npm ci
      - run: npm run build
      
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://farone11:$HF_TOKEN@huggingface.co/spaces/farone11/data-statistik-transportasi hf
          rm -rf hf/*
          cp -r dist/* hf/
          cd hf
          git config user.email "github-action[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add.
          git commit -m "Deploy from ${{ github.sha }}" || echo "No changes"
          git push
